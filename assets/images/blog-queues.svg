<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDB70" />
      <stop offset="100%" stop-color="#F39C12" />
    </linearGradient>
    <linearGradient id="bgQ" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#121217" />
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgQ)"/>
  
  <!-- Circuit board background lines -->
  <path d="M0,100 L150,100 L200,50 L600,50 M0,300 L200,300 L250,350 L600,350" stroke="#2B2B35" stroke-width="2" fill="none"/>
  
  <text x="300" y="50" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold" text-anchor="middle" letter-spacing="2">DATA STRUCTURES</text>
  
  <!-- Stack Drawing -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="100" height="200" fill="none" stroke="url(#qg)" stroke-width="4" rx="10"/>
    <rect x="15" y="140" width="70" height="40" fill="url(#qg)" rx="5"/>
    <text x="50" y="165" font-family="Arial" font-size="16" fill="#121217" font-weight="bold" text-anchor="middle">10</text>
    <rect x="15" y="80" width="70" height="40" fill="url(#qg)" rx="5" opacity="0.8"/>
    <text x="50" y="105" font-family="Arial" font-size="16" fill="#121217" font-weight="bold" text-anchor="middle">20</text>
    <rect x="15" y="20" width="70" height="40" fill="none" stroke="#4B4B5A" stroke-width="2" stroke-dasharray="4,4" rx="5"/>
    
    <!-- Push/Pop Arrows -->
    <path d="M 50,-30 L 50,0" stroke="url(#qg)" stroke-width="4"/>
    <polygon points="50,10 40,-5 60,-5" fill="url(#qg)"/>
    <text x="50" y="230" font-family="Arial" font-size="20" fill="#FFFFFF" font-weight="bold" text-anchor="middle">STACK (LIFO)</text>
  </g>

  <!-- Queue Drawing -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="220" height="100" fill="none" stroke="#10B981" stroke-width="4" rx="10"/>
    <rect x="20" y="15" width="40" height="70" fill="#10B981" rx="5"/>
    <text x="40" y="55" font-family="Arial" font-size="16" fill="#121217" font-weight="bold" text-anchor="middle">5</text>
    
    <rect x="80" y="15" width="40" height="70" fill="#10B981" rx="5" opacity="0.8"/>
    <text x="100" y="55" font-family="Arial" font-size="16" fill="#121217" font-weight="bold" text-anchor="middle">15</text>
    
    <rect x="140" y="15" width="40" height="70" fill="none" stroke="#4B4B5A" stroke-width="2" stroke-dasharray="4,4" rx="5"/>

    <!-- Enqueue/Dequeue Arrows -->
    <path d="M 250,50 L 230,50" stroke="#10B981" stroke-width="4"/>
    <polygon points="220,50 235,40 235,60" fill="#10B981"/>
    
    <path d="M 0,50 L -20,50" stroke="#10B981" stroke-width="4"/>
    <polygon points="-30,50 -15,40 -15,60" fill="#10B981"/>
    
    <text x="110" y="140" font-family="Arial" font-size="20" fill="#FFFFFF" font-weight="bold" text-anchor="middle">QUEUE (FIFO)</text>
  </g>
</svg>
