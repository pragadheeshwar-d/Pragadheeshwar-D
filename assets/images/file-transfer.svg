<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ftG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="ftBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <radialGradient id="ftGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#ftBg)"/>
  <circle cx="400" cy="300" r="250" fill="url(#ftGlow)"/>

  <!-- Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>

  <!-- Device 1 - Laptop -->
  <g transform="translate(120, 200)">
    <rect x="0" y="0" width="160" height="110" rx="10" fill="#1E293B" stroke="url(#ftG)" stroke-width="3"/>
    <rect x="10" y="10" width="140" height="80" rx="5" fill="#0F172A"/>
    <!-- Screen content -->
    <rect x="20" y="20" width="50" height="8" rx="3" fill="#06B6D4" opacity="0.7"/>
    <rect x="20" y="35" width="80" height="6" rx="3" fill="#475569"/>
    <rect x="20" y="48" width="60" height="6" rx="3" fill="#475569"/>
    <rect x="20" y="61" width="70" height="6" rx="3" fill="#475569"/>
    <!-- File icon -->
    <rect x="100" y="25" width="30" height="38" rx="3" fill="#8B5CF6" opacity="0.8"/>
    <rect x="105" y="34" width="20" height="3" rx="1" fill="#E0E7FF"/>
    <rect x="105" y="41" width="20" height="3" rx="1" fill="#E0E7FF"/>
    <rect x="105" y="48" width="14" height="3" rx="1" fill="#E0E7FF"/>
    <!-- Base -->
    <rect x="-15" y="110" width="190" height="12" rx="6" fill="#334155"/>
    <text x="80" y="145" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">SENDER</text>
  </g>

  <!-- Device 2 - Phone -->
  <g transform="translate(550, 190)">
    <rect x="0" y="0" width="90" height="150" rx="12" fill="#1E293B" stroke="url(#ftG)" stroke-width="3"/>
    <rect x="8" y="15" width="74" height="115" rx="5" fill="#0F172A"/>
    <!-- Screen content -->
    <rect x="15" y="25" width="40" height="6" rx="3" fill="#06B6D4" opacity="0.7"/>
    <rect x="15" y="38" width="55" height="5" rx="2" fill="#475569"/>
    <rect x="15" y="50" width="45" height="5" rx="2" fill="#475569"/>
    <!-- Download icon -->
    <circle cx="45" cy="90" r="18" fill="#8B5CF6" opacity="0.3"/>
    <path d="M45,78 L45,98 M37,92 L45,100 L53,92" stroke="#8B5CF6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Notch -->
    <rect x="30" y="3" width="30" height="8" rx="4" fill="#0F172A"/>
    <text x="45" y="175" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">RECEIVER</text>
  </g>

  <!-- Transfer Arrow Animation Path -->
  <path d="M300,270 C370,220 430,220 530,270" fill="none" stroke="url(#ftG)" stroke-width="4" stroke-dasharray="12,6"/>
  <!-- Arrow head -->
  <polygon points="525,260 540,272 525,278" fill="#06B6D4"/>

  <!-- Flying file packets -->
  <g opacity="0.9">
    <rect x="350" y="228" width="24" height="20" rx="3" fill="#06B6D4" transform="rotate(-10, 362, 238)"/>
    <rect x="355" y="235" width="14" height="2" rx="1" fill="#FFF" transform="rotate(-10, 362, 236)"/>
    <rect x="355" y="240" width="10" height="2" rx="1" fill="#FFF" transform="rotate(-10, 362, 241)"/>
  </g>
  <g opacity="0.6">
    <rect x="430" y="225" width="20" height="16" rx="3" fill="#8B5CF6" transform="rotate(-5, 440, 233)"/>
    <rect x="434" y="231" width="12" height="2" rx="1" fill="#FFF" transform="rotate(-5, 440, 232)"/>
  </g>

  <!-- Progress bar -->
  <rect x="250" y="380" width="300" height="14" rx="7" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="252" y="382" width="210" height="10" rx="5" fill="url(#ftG)"/>
  <text x="400" y="415" font-family="Arial" font-size="14" fill="#06B6D4" text-anchor="middle" font-weight="bold">72% — 12.4 MB/s</text>

  <!-- Title -->
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="32" fill="#FFFFFF" font-weight="bold" text-anchor="middle">FileTransfer</text>
  <text x="400" y="530" font-family="Arial, sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle">Seamless Cross-Device File Sharing</text>

  <!-- Security badge -->
  <g transform="translate(370, 445)">
    <path d="M15,0 L30,8 L30,22 C30,32 22,38 15,42 C8,38 0,32 0,22 L0,8 Z" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
    <path d="M10,20 L14,24 L22,15" stroke="#10B981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="28" font-family="Arial" font-size="11" fill="#10B981">End-to-End Encrypted</text>
  </g>
</svg>
