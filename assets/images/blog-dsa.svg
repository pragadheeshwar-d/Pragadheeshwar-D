<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dsaG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="bgDSA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1033"/>
      <stop offset="100%" stop-color="#0D0820"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgDSA)"/>

  <!-- Grid lines -->
  <g stroke="#2D1B6B" stroke-width="1">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
  </g>

  <!-- Binary Tree -->
  <!-- Root -->
  <circle cx="300" cy="80" r="28" fill="url(#dsaG)"/>
  <text x="300" y="86" font-family="monospace" font-size="16" fill="white" font-weight="bold" text-anchor="middle">50</text>

  <!-- Level 2 -->
  <circle cx="180" cy="170" r="24" fill="#7C3AED"/>
  <text x="180" y="176" font-family="monospace" font-size="15" fill="white" font-weight="bold" text-anchor="middle">30</text>
  <circle cx="420" cy="170" r="24" fill="#7C3AED"/>
  <text x="420" y="176" font-family="monospace" font-size="15" fill="white" font-weight="bold" text-anchor="middle">70</text>

  <!-- Level 3 -->
  <circle cx="110" cy="260" r="20" fill="#6D28D9"/>
  <text x="110" y="266" font-family="monospace" font-size="13" fill="white" font-weight="bold" text-anchor="middle">20</text>
  <circle cx="250" cy="260" r="20" fill="#6D28D9"/>
  <text x="250" y="266" font-family="monospace" font-size="13" fill="white" font-weight="bold" text-anchor="middle">40</text>
  <circle cx="490" cy="260" r="20" fill="#6D28D9"/>
  <text x="490" y="266" font-family="monospace" font-size="13" fill="white" font-weight="bold" text-anchor="middle">90</text>

  <!-- Edges -->
  <line x1="280" y1="100" x2="200" y2="148" stroke="url(#dsaG)" stroke-width="3"/>
  <line x1="320" y1="100" x2="400" y2="148" stroke="url(#dsaG)" stroke-width="3"/>
  <line x1="165" y1="191" x2="125" y2="241" stroke="#A78BFA" stroke-width="2.5"/>
  <line x1="195" y1="191" x2="238" y2="241" stroke="#A78BFA" stroke-width="2.5"/>
  <line x1="435" y1="191" x2="477" y2="241" stroke="#A78BFA" stroke-width="2.5"/>

  <!-- Complexity tag -->
  <rect x="20" y="310" width="195" height="60" rx="10" fill="#2D1B6B"/>
  <text x="33" y="333" font-family="monospace" font-size="12" fill="#A78BFA">Time Complexity</text>
  <text x="33" y="357" font-family="monospace" font-size="18" fill="white" font-weight="bold">O(log n)</text>

  <!-- Algo tag -->
  <rect x="385" y="310" width="195" height="60" rx="10" fill="#2D1B6B"/>
  <text x="398" y="333" font-family="monospace" font-size="12" fill="#F0ABFC">BFS / DFS</text>
  <text x="398" y="357" font-family="monospace" font-size="18" fill="white" font-weight="bold">Graph Algo</text>

  <!-- Title banner -->
  <rect x="0" y="0" width="600" height="38" fill="#0D0820" opacity="0.85"/>
  <text x="300" y="25" font-family="Arial, sans-serif" font-size="18" fill="url(#dsaG)" font-weight="bold" text-anchor="middle" letter-spacing="3">DATA STRUCTURES &amp; ALGORITHMS</text>
</svg>
