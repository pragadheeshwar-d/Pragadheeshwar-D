<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="techG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#121217" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgT)"/>
  <circle cx="300" cy="200" r="180" fill="url(#glow)"/>
  
  <!-- Cyber Grid -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <path d="M0,100 L600,100 M0,200 L600,200 M0,300 L600,300" />
    <path d="M100,0 L100,400 M200,0 L200,400 M300,0 L300,400 M400,0 L400,400 M500,0 L500,400"/>
  </g>

  <!-- Glowing nodes / Tech Elements -->
  <circle cx="150" cy="150" r="25" fill="#3B82F6"/>
  <circle cx="450" cy="150" r="25" fill="#8B5CF6"/>
  <circle cx="300" cy="300" r="30" fill="url(#techG)"/>
  <circle cx="300" cy="100" r="20" fill="#10B981"/>

  <path d="M150,150 L300,300 L450,150 L300,100 Z" fill="none" stroke="url(#techG)" stroke-width="3" stroke-dasharray="5,5"/>
  <path d="M300,300 L300,100" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2"/>
  <path d="M150,150 L450,150" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Texts for icons -->
  <text x="150" y="155" fill="#FFFFFF" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">AI</text>
  <text x="450" y="155" fill="#FFFFFF" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">VR</text>
  <text x="300" y="305" fill="#FFFFFF" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">WEB3</text>
  <text x="300" y="105" fill="#FFFFFF" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">EV</text>

  <!-- Title overlay -->
  <rect x="100" y="180" width="400" height="40" fill="#020617" opacity="0.8" rx="8"/>
  <text x="300" y="206" font-family="Arial, sans-serif" font-size="22" fill="#FFFFFF" font-weight="bold" text-anchor="middle">TECH IN 2026</text>
</svg>
